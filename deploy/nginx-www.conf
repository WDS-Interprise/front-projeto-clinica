# ClinMax front — Nginx (VPS compartilhada com Vila Vault)
#
# SEM listen 80/443 neste arquivo: evita roubar tráfego do Vila Vault na mesma VPS.
# Certbot adiciona bloco listen 443 ssl em /etc/nginx/sites-available/clinmax-www na VPS.
# O deploy NÃO sobrescreve o arquivo na VPS se já existir SSL (listen 443).
#
# Origem Cloudflare / acesso direto:
#   - Porta dedicada: 3551 -> http://<IP>:3551 ou origin :3551 no Cloudflare
#   - HTTPS público: certbot --nginx -d clinmax.com.br -d www.clinmax.com.br

server {
    listen 3551;
    listen [::]:3551;
    server_name www.clinmax.com.br clinmax.com.br;

    root /var/www/clinmax-front;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/javascript application/json;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|webp|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }
}
