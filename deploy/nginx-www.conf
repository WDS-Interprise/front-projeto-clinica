# /etc/nginx/sites-available/clinmax-www
# Domínios: www.clinmax.com.br e clinmax.com.br

server {
    listen 80;
    listen [::]:80;
    server_name www.clinmax.com.br clinmax.com.br;

    root /var/www/clinmax-front;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/javascript application/json;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|webp|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }
}
