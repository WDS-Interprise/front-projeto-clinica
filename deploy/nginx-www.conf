# HTTP base — Certbot adiciona bloco listen 443 na VPS.
# O deploy NÃO sobrescreve este arquivo se já existir SSL (listen 443).
# Porta dedicada ClinMax front: 3551 (+ 80 para Cloudflare/origem padrão)

server {
    listen 3551;
    listen [::]:3551;
    listen 80;
    listen [::]:80;
    server_name www.clinmax.com.br clinmax.com.br;

    root /var/www/clinmax-front;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/javascript application/json;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|webp|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }
}
