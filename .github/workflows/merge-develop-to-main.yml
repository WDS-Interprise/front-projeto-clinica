# Merge develop → main após push ou PR mergeado em develop.
# O push em main (via PAT_TOKEN) dispara deploy.yml na VPS.

name: Merge develop into main

on:
  push:
    branches:
      - develop
  pull_request:
    types: [closed]
    branches:
      - develop

permissions:
  contents: read

concurrency:
  group: merge-develop-main-front
  cancel-in-progress: true

jobs:
  merge:
    if: github.event_name == 'push' || github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    environment: Production
    permissions:
      contents: write

    steps:
      - name: Validar PAT_TOKEN
        run: |
          if [ -z "${{ secrets.PAT_TOKEN }}" ]; then
            echo "::error::Secret PAT_TOKEN ausente no Environment Production."
            echo "Crie um Personal Access Token (classic) com escopos repo + workflow"
            echo "e adicione em Settings → Environments → Production → Secrets."
            exit 1
          fi

      - name: Checkout (PAT para o push disparar deploy em main)
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ secrets.PAT_TOKEN }}

      - name: Merge develop -> main e push
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin main develop
          git checkout -B main origin/main
          if ! git merge --no-ff --no-edit origin/develop; then
            echo "::error::Conflito ao fazer merge de develop para main. Resolva manualmente."
            git merge --abort || true
            exit 1
          fi
          git push origin main
