# develop → main → deploy VPS (sem PAT_TOKEN: deploy roda no mesmo workflow)

name: Merge develop into main

on:
  push:
    branches:
      - develop
  pull_request:
    types: [closed]
    branches:
      - develop

permissions:
  contents: read

concurrency:
  group: merge-develop-main-front
  cancel-in-progress: true

jobs:
  merge:
    if: github.event_name == 'push' || github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Merge develop -> main e push
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin main develop
          git checkout -B main origin/main
          if ! git merge --no-ff --no-edit origin/develop; then
            echo "::error::Conflito ao fazer merge de develop para main. Resolva manualmente."
            git merge --abort || true
            exit 1
          fi
          git push origin main

  deploy:
    needs: merge
    uses: ./.github/workflows/deploy.yml
    with:
      ref: main
    secrets: inherit
